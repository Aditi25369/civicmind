steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - build
      - -t
      - 'gcr.io/$PROJECT_ID/civicmind-api:$COMMIT_SHA'
      - ./backend
    id: build-backend

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - push
      - 'gcr.io/$PROJECT_ID/civicmind-api:$COMMIT_SHA'
    id: push-backend
    waitFor: ['build-backend']

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - civicmind-api
      - --image=gcr.io/$PROJECT_ID/civicmind-api:$COMMIT_SHA
      - --region=us-central1
      - --platform=managed
      - --allow-unauthenticated
      - --set-env-vars=GCP_PROJECT_ID=$PROJECT_ID
      - --memory=1Gi
      - --cpu=1
      - --min-instances=0
      - --max-instances=10
    id: deploy-backend
    waitFor: ['push-backend']

  - name: 'node:20'
    entrypoint: bash
    args:
      - -c
      - |
        cd frontend
        npm ci
        VITE_API_URL=$(gcloud run services describe civicmind-api --region=us-central1 --format='value(status.url)') \
          npm run build
    id: build-frontend
    waitFor: ['deploy-backend']

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: bash
    args:
      - -c
      - |
        npm install -g firebase-tools
        firebase deploy --only hosting --token $FIREBASE_TOKEN
    id: deploy-frontend
    waitFor: ['build-frontend']
    secretEnv: ['FIREBASE_TOKEN']

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/firebase-token/versions/latest
      env: FIREBASE_TOKEN

images:
  - 'gcr.io/$PROJECT_ID/civicmind-api:$COMMIT_SHA'

timeout: 1200s